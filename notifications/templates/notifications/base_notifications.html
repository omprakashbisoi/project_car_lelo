{% extends "base.html" %}

{% block content %}

<style>
.container {
    max-width: 900px;
}

/* Tabs */
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #eee;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.tab-btn.active {
    background: #0d6efd;
    color: white;
}

/* Section */
.hidden {
    display: none;
}
</style>

<div class="container mt-4">

    <h3>🔔 Notifications</h3>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('buyer')">Buyer</button>
        <button class="tab-btn" onclick="showTab('seller')">Seller</button>
    </div>

    <!-- Buyer Section -->
    <div id="buyer-section">
        {% include 'notifications/buyer_notifications.html' %}
    </div>

    <!-- Seller Section -->
    <div id="seller-section" class="hidden">
        {% include 'notifications/seller_notifications.html' %}
    </div>

</div>

<script>
function showTab(tab) {
    const buyer = document.getElementById('buyer-section');
    const seller = document.getElementById('seller-section');
    const buttons = document.querySelectorAll('.tab-btn');

    buttons.forEach(btn => btn.classList.remove('active'));

    if (tab === 'buyer') {
        buyer.classList.remove('hidden');
        seller.classList.add('hidden');
        buttons[0].classList.add('active');
    } else {
        seller.classList.remove('hidden');
        buyer.classList.add('hidden');
        buttons[1].classList.add('active');
    }
}
</script>

{% endblock %}
