{% extends "base_of_otp.html" %}

{% block content %}

<div class="auth-card">

  <h4 class="text-center mb-2">Verify OTP</h4>
  <p class="text-center text-muted">
    Enter the 6-digit code sent to your email
  </p>

  <!-- ERROR -->
  {% if error %}
  <div class="alert alert-danger text-center">
    {{ error }}
  </div>
  {% endif %}

  {% if form.errors %}
  <div class="alert alert-danger text-center">
    {{ form.errors }}
  </div>
  {% endif %}

  <form method="POST" action="{% url 'password_verify_otp' %}">
    {% csrf_token %}

    <!-- OTP BOXES -->
    <div class="otp-container">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
      <input type="text" maxlength="1" class="otp-input">
    </div>

    <!-- HIDDEN OTP -->
    <input type="hidden" name="otp" id="otp-value">

    <!-- SUBMIT -->
    <button type="submit" class="btn btn-warning w-100 mt-4">
      Verify OTP
    </button>
  </form>

  <!-- RESEND -->
  <div class="text-center mt-3">
    <a href="{% url 'resend_otp' %}" class="btn btn-outline-warning">
      Resend OTP
    </a>
  </div>

</div>

<!-- STYLE -->
<style>
.otp-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}
.otp-input {
  width: 45px;
  height: 50px;
  font-size: 22px;
  text-align: center;
  border: 1px solid #ced4da;
  border-radius: 8px;
}
.otp-input:focus {
  border-color: #ffc107;
  outline: none;
  box-shadow: 0 0 5px rgba(255,193,7,.5);
}
</style>

<!-- SCRIPT (VERY IMPORTANT) -->
<script>
const inputs = document.querySelectorAll(".otp-input");
const hiddenInput = document.getElementById("otp-value");

// Auto focus + move next
inputs.forEach((input, index) => {
  input.addEventListener("input", (e) => {
    if (e.target.value.length === 1 && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
    updateOTP();
  });

  // Backspace move previous
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });
});

// Combine OTP
function updateOTP() {
  let otp = "";
  inputs.forEach(input => {
    otp += input.value;
  });
  hiddenInput.value = otp;
}
</script>

{% endblock %}
