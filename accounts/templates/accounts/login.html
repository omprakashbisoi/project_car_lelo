{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container-fluid" style="min-height:90vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('/static/images/car-bg.jpg'); background-size:cover; background-position:center;">

<div class="row justify-content-center align-items-center" style="min-height:90vh;">

<div class="col-md-4">

<div class="card shadow-lg p-4" style="border-radius:12px;">

<h3 class="text-center mb-4">🚗 CarLelo Login</h3>

<form action="{% url 'login' %}" method="post">

{% csrf_token %}

{{ form|crispy }}

<button type="submit" class="btn btn-warning w-100 mt-2">
Login
</button>

<p class="text-center mt-3">
<a href="{% url 'forget_password' %}">
Forgot Password?
</a>
</p>

<p class="text-center">
Don't have an account?
<a href="{% url 'register' %}">
Register
</a>
</p>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
