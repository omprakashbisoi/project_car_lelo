{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'buyer/css/car_showcase.css' %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

{{ wishlist_car_ids|json_script:"wishlist-data" }}
{{ is_user_authenticated|json_script:"auth-data" }}

<div class="listings-page">
  <div class="listings-inner">
    <div class="listings-header">
      <div>
        <h2>Latest Listings</h2>
        <p>Browse recently added cars</p>
      </div>
      <div class="listings-count">
        <span class="live-dot"></span>
        <span id="carCount">0 cars available</span>
      </div>
    </div>

    <div id="carGrid" class="car-grid"></div>

    <div id="emptyState" class="empty-wrap" style="display: none;">
      <i class="bi bi-car-front"></i>
      <p>No listings right now. Check back soon!</p>
    </div>
  </div>
</div>

<script>
  const apiUrl = "/api/buyer/cars/";
  const detailTemplate = "{% url 'car_detail_view' 0 %}";
  const wishlistTemplate = "{% url 'wishlist_toggle_api' 0 %}";
  const defaultImage = "{% static 'images/default_car.jpg' %}";
  const isAuthenticated = JSON.parse(document.getElementById("auth-data").textContent || "false");

  let wishlistIds = new Set(JSON.parse(document.getElementById("wishlist-data").textContent || "[]"));

  function getCookie(name) {
    const cookieValue = `; ${document.cookie}`;
    const parts = cookieValue.split(`; ${name}=`);
    if (parts.length === 2) {
      return parts.pop().split(';').shift();
    }
    return "";
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function goToDetail(carId) {
    window.location.href = detailTemplate.replace("0", carId);
  }

  function showLoginPopup() {
    alert("For wishlist you have to login fast");
  }

  function renderCars(cars) {
    const grid = document.getElementById("carGrid");
    const emptyState = document.getElementById("emptyState");
    const countEl = document.getElementById("carCount");

    countEl.textContent = `${cars.length} car${cars.length === 1 ? "" : "s"} available`;

    if (!cars.length) {
      grid.innerHTML = "";
      emptyState.style.display = "block";
      return;
    }

    emptyState.style.display = "none";

    grid.innerHTML = cars.map((car) => {
      const firstImage = car.images && car.images.length ? car.images[0].car_image : "";
      const imageSrc = firstImage || defaultImage;
      const isWishlisted = wishlistIds.has(car.id);

      return `
      <div class="car-card" onclick="goToDetail(${car.id})">
        <div class="card-img-wrap">
          <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(car.brand)} ${escapeHtml(car.car_model)}">
          <div class="img-overlay"></div>
          <div class="view-pill">View Details &rarr;</div>

          <div class="wishlist-wrap">
            <button type="button" class="wishlist-btn" data-car-id="${car.id}" aria-label="Wishlist" onclick="event.stopPropagation(); toggleWishlist(${car.id}, this)">
              <i class="bi ${isWishlisted ? "bi-heart-fill" : "bi-heart"} heart-icon"></i>
            </button>
          </div>
        </div>

        <div class="card-body-inner">
          <span class="verified-tag">
            <i class="bi bi-patch-check-fill"></i> Car Lelo Verified
          </span>

          <div class="car-title">
            ${escapeHtml(car.year)} ${escapeHtml(car.brand)} ${escapeHtml(car.car_model)} ${escapeHtml(car.variant || "")}
          </div>

          <div class="specs-row">
            <span class="spec-chip"><i class="bi bi-speedometer2"></i> ${escapeHtml(car.kilometers)}</span>
            <span class="spec-chip"><i class="bi bi-fuel-pump"></i> ${escapeHtml(car.fuel_type)}</span>
          </div>

          <div class="card-sep"></div>

          <div class="card-foot">
            <div class="price-val">Rs. ${escapeHtml(car.price)}</div>
            <div class="location-tag">
              <i class="bi bi-geo-alt-fill"></i> ${escapeHtml(car.car_location || "")}
            </div>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  async function toggleWishlist(carId, buttonEl) {
    if (!isAuthenticated) {
      showLoginPopup();
      return;
    }

    try {
      const res = await fetch(wishlistTemplate.replace("0", carId), {
        method: "POST",
        headers: {
          "X-CSRFToken": getCookie("csrftoken"),
        },
        credentials: "same-origin",
      });

      if (!res.ok) {
        if (res.status === 401) {
          showLoginPopup();
        }
        return;
      }

      const data = await res.json();
      const icon = buttonEl.querySelector(".heart-icon");
      if (data.wished) {
        wishlistIds.add(carId);
        icon.classList.remove("bi-heart");
        icon.classList.add("bi-heart-fill");
      } else {
        wishlistIds.delete(carId);
        icon.classList.remove("bi-heart-fill");
        icon.classList.add("bi-heart");
      }

      icon.classList.remove("heart-pop");
      void icon.offsetWidth;
      icon.classList.add("heart-pop");
    } catch (error) {
      console.error("Wishlist toggle failed", error);
    }
  }

  async function loadCars() {
    try {
      const response = await fetch(apiUrl, { credentials: "same-origin" });
      if (!response.ok) {
        throw new Error("Failed to load cars");
      }
      const cars = await response.json();
      renderCars(cars);
    } catch (error) {
      console.error(error);
      document.getElementById("carGrid").innerHTML = "";
      document.getElementById("emptyState").style.display = "block";
      document.getElementById("carCount").textContent = "0 cars available";
    }
  }

  loadCars();
</script>

{% endblock %}
