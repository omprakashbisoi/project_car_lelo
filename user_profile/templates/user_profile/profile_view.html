{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

```
<!-- NAVIGATION TABS -->
<ul class="nav nav-tabs mb-4">

    <li class="nav-item">
        <a class="nav-link active" href="#">Edit Profile</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="#">Wishlist</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="#">Orders</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="#">Bookings</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="#">Sell</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="#">Dashboard</a>
    </li>

</ul>


<div class="row">

    <!-- LEFT PROFILE CARD -->
    <div class="col-md-3">

        <div class="card shadow text-center p-4">

            {% if profile.profile_image %}
            <img src="{{ profile.profile_image.url }}"
                 class="rounded-circle mx-auto mb-3"
                 width="120"
                 height="120"
                 style="object-fit:cover;">
            {% else %}
            <img src="https://via.placeholder.com/120"
                 class="rounded-circle mx-auto mb-3">
            {% endif %}
            
            <hr>
            <!-- Profile profile_Image -->
                <div class="col-md-14 mb-1">
                    <input type="file"
                           name="profile_image"
                           class="form-control">
                </div>

            <a href="{% url 'logout' %}" class="btn btn-danger w-100">
                Sign Out
            </a>

        </div>

    </div>


    <!-- RIGHT PROFILE FORM -->
    <div class="col-md-9">

        <div class="card shadow p-4">

            <h4 class="mb-4">Profile Details</h4>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="row">

                    <!-- Username -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control"
                               value="{{ user.username }}"
                               readonly>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ user.email }}"
                               readonly>
                    </div>

                    <!-- Mobile / Bio -->
                    <div class="row">

                        <!-- Mobile -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="tel"
                                name="mobile"
                                class="form-control"
                                value="{{ profile_form.mobile.value|default:'' }}"
                                placeholder="Enter 10-digit mobile number"
                                pattern="[0-9]{10}"
                                maxlength="10"
                                required>
                        </div>

                        <!-- City -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">City</label>
                            <input type="text"
                                name="city"
                                class="form-control"
                                value="{{ location_form.city.value }}"
                                placeholder="e.g. Mumbai"
                                required>
                        </div>

                        <!-- State -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">State</label>
                            <input type="text"
                                name="state"
                                class="form-control"
                                value="{{ location_form.state.value|default:'' }}"
                                placeholder="e.g. Maharashtra"
                                required>
                        </div>

                        <!-- PIN -->
                        <div class="col-md-6 mb-3">
                            <label class="form-label">PIN Code</label>
                            <input type="text"
                                name="pin"
                                class="form-control"
                                value="{{ location_form.pin.value|default:'' }}"
                                placeholder="6-digit PIN code"
                                pattern="[0-9]{6}"
                                maxlength="6"
                                required>
                        </div>

                        <!-- Address -->
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Address</label>
                            <textarea name="address"
                                    class="form-control"
                                    rows="3"
                                    placeholder="House no, street, area">{{ location_form.address.value|default:'' }}</textarea>
                        </div>

                    </div>
                </div>


                <!-- ACTION BUTTONS -->
                <div class="d-flex justify-content-between mt-3">

                    <form method="POST" action="{% url 'delete_profile' %}">
                            {% csrf_token %}
                            <button type="submit">Delete Profile</button>
                        </form>

                    <button type="submit" class="btn btn-primary">
                        Update Profile
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
