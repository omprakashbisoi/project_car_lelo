{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

{% for car in cars %}

<div class="card shadow-sm mb-4">

<div class="card-header d-flex justify-content-between align-items-center">

<h5 class="mb-0">
{{ car.brand }} - {{ car.car_model }}
</h5>

<a href="{% url 'image_upload' car.id %}" class="btn btn-primary btn-sm">
Upload Image
</a>

</div>

<div class="card-body">

<div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3">

{% for image in car.images.all %}

<div class="col">

<div class="card h-100 text-center">

<img src="{{ image.image.url }}" class="card-img-top img-fluid" style="height:140px; object-fit:cover;">

<div class="card-body p-2">

<span class="badge bg-secondary">
{{ image.img_type|title }}
</span>

<div class="d-flex justify-content-center gap-1">

<a href="{% url 'uploded_image_edit' image.id %}" 
class="btn btn-warning btn-sm">
Edit
</a>

<form action="{% url 'uploded_image_delete' image.id %}" method="POST">
{% csrf_token %}
<button class="btn btn-danger btn-sm">
Delete
</button>
</form>

</div>

</div>

</div>

</div>

{% empty %}

<p class="text-muted">No images uploaded yet.</p>

{% endfor %}

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
